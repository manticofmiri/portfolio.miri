<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miriam Costa Manticof - Home</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- CSS COMPARTIDOS -->
    <link rel="stylesheet" href="variables.css">
    <link rel="stylesheet" href="general.css">
    <link rel="stylesheet" href="cv.css">
    
    <style>
        /* ESTILOS ESPECÍFICOS DEL HOME */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: var(--white);
            padding: 0 20px;
        }

        .hero h1 {
            font-size: 4em;
            font-weight: 700;
            margin-bottom: 1rem;
            animation: fadeInUp 1s ease;
        }

        .hero .subtitle {
            font-size: 1.5em;
            margin-bottom: 2rem;
            opacity: 0.9;
            animation: fadeInUp 1s ease 0.2s both;
        }

        .cta-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            animation: fadeInUp 1s ease 0.4s both;
        }

        .btn {
            padding: 15px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-primary {
            background: var(--white);
            color: var(--primary-color);
            box-shadow: 0 10px 30px rgba(255,255,255,0.3);
        }

        .btn-secondary {
            background: transparent;
            color: var(--white);
            border: 2px solid var(--white);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .hero h1 { font-size: 2.5em; }
            .cta-buttons { flex-direction: column; align-items: center; }
        }
    </style>
</head>
<body>
    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">Miriam Costa Manticof </div>
            <ul class="nav-links">
                <li><a href="index.html">🏠 Home</a></li>
                <li><a href="cv.html">📄 CV</a></li>
                <li><a href="proyectos.html">🚀 Proyectos</a></li>
                <li><a href="qa.html">🧪 QA</a></li>
                <li><a href="blog.html">✍️ Blog</a></li>
                <li><a href="contact.html">📧 Contact</a></li>
            </ul>
        </div>
    </nav>

    <!-- HERO SECTION (SIN CONTENEDOR BLANCO) -->
    <section class="hero">
        <div>
            <h1>¡Hi! I'm <span style="background: linear-gradient(135deg, #fff 0%, #f0f0f0 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Miriam Costa Manticof</span></h1>
            <p class="subtitle">Looking for new opportunities |QA Tester | Manual Testing | </p>
            <div class="cta-buttons">
                <a href="cv.html" class="btn btn-primary">📄 Ver mi CV</a>
                <a href="proyectos.html" class="btn btn-secondary">🚀 Mis Proyectos</a>
            </div>
        </div>
    </section>
</body>
</html>
