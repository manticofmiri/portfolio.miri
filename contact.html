<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Miriam Costa Manticof</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/general.css">
    <link rel="stylesheet" href="css/contact.css">
</head>
<body>
    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">Miriam Costa Manticof</div>
            <ul class="nav-links">
                <li><a href="index.html">🏠 Home</a></li>
                <li><a href="cv.html">📄 CV</a></li>
                <li><a href="proyectos.html">🚀 Projects</a></li>
                <li><a href="qa.html">🧪 QA</a></li>
                <li><a href="blog.html">✍️ Blog</a></li>
                <li><a href="contacto.html" class="active">📧 Contact</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="profile">
            <div class="profile-header">
                <h1><i class="fas fa-paper-plane"></i> Contact Me</h1>
                <p class="profile-subtitle">Fill the form and I'll reply soon</p>
            </div>
            
            <div class="profile-content">
                <div class="contact-form">
                    <h2 class="section-title"><i class="fas fa-edit"></i> Send Message</h2>
                    <div id="message" class="message"></div>
                    
                    <form id="contactForm">
                        <div class="form-group">
                            <label>Full Name *</label>
                            <input type="text" name="name" required>
                        </div>
                        <div class="form-group">
                            <label>Email *</label>
                            <input type="email" name="email" required>
                        </div>
                        <div class="form-group">
                            <label>Message *</label>
                            <textarea name="message" required rows="5"></textarea>
                        </div>
                        <button type="submit" class="download-btn">
                            <i class="fas fa-save"></i> Save to Sheet
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ← AQUÍ PEGAS TU URL (paso 3)
        const SHEET_URL = 'TU_URL_AQUÍ';
        
        document.getElementById('contactForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            const btn = this.querySelector('button');
            const msg = document.getElementById('message');
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
            
            try {
                const response = await fetch(SHEET_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        date: new Date().toLocaleString(),
                        name: formData.get('name'),
                        email: formData.get('email'),
                        message: formData.get('message')
                    })
                });
                
                if (response.ok) {
                    msg.innerHTML = '✅ Saved to Excel! Thanks!';
                    msg.className = 'message success';
                    this.reset();
                }
            } catch {
                msg.innerHTML = '❌ Error. Try again.';
                msg.className = 'message error';
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-save"></i> Save to Sheet';
            }
        });
    </script>
</body>
</html>
